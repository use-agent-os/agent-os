<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>AgentOS Control</title>
    <!-- Favicon parity: templates/index.html head — icon + shortcut icon +
         apple-touch-icon all point at agentos-mark.png. Referenced from src
         so Vite fingerprints the asset and rewrites the URL under base_path. -->
    <link rel="icon" type="image/png" href="/src/assets/agentos-mark.png" />
    <link rel="shortcut icon" type="image/png" href="/src/assets/agentos-mark.png" />
    <link rel="apple-touch-icon" href="/src/assets/agentos-mark.png" />
    <script>
      // Theme flash prevention: must run BEFORE CSS so the first paint
      // already has the correct `data-theme`. Mirrors stores/theme.ts.
      ;(function () {
        try {
          var t = localStorage.getItem('agentos-theme')
          if (t !== 'dark' && t !== 'light') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          }
          document.documentElement.setAttribute('data-theme', t)
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light')
        }
      })()
    </script>
  </head>
  <body>
    <noscript>
      <div style="padding:2rem;font-family:system-ui,-apple-system,sans-serif;max-width:560px;margin:2rem auto">
        <h2 style="margin:0 0 .5rem">JavaScript required</h2>
        <p style="margin:0">AgentOS Control needs JavaScript to render the chat, sessions, and configuration views.</p>
      </div>
    </noscript>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
