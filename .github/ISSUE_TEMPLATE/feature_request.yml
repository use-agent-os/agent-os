name: Feature request
description: Propose a focused AgentOS improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user-facing problem or workflow gap.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest behavior change that would solve the problem.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Gateway
        - Web UI
        - Provider integration
        - Channel integration
        - Memory
        - Scheduler
        - Tools
        - Packaging or install
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Note any simpler workaround or existing AgentOS behavior you tried.
    validations:
      required: false
