name: LLM Smoke

"on":
  workflow_dispatch:

permissions:
  contents: read

jobs:
  llm-smoke:
    name: Live LLM smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_BASE_URL: ${{ vars.OPENROUTER_BASE_URL || 'https://openrouter.ai/api/v1' }}
      LLM_TEST_MODEL: ${{ vars.LLM_TEST_MODEL || 'openai/gpt-4o-mini' }}
      AGENTOS_TURN_CALL_LOG: "0"
      TMPDIR: /tmp

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure runtime directories
        shell: bash
        run: printf 'AGENTOS_LOG_DIR=%s/agentos-logs\n' "$RUNNER_TEMP" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync --extra dev --frozen

      - name: Run smoke
        run: uv run pytest tests/functional/test_llm_smoke.py -q -s
