name: Web UI Browser Smoke

"on":
  workflow_dispatch:
  pull_request:
    paths:
      - "frontend/**"
      - "scripts/build_control_ui.py"
      - "src/agentos/gateway/boot.py"
      - "src/agentos/gateway/config.py"
      - "src/agentos/gateway/control_ui.py"
      - "src/agentos/gateway/middleware.py"
      - "tests/functional/test_webui_browser*.py"
      - ".github/workflows/webui-browser-smoke.yml"
      - "pyproject.toml"
      - "uv.lock"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "scripts/build_control_ui.py"
      - "src/agentos/gateway/boot.py"
      - "src/agentos/gateway/config.py"
      - "src/agentos/gateway/control_ui.py"
      - "src/agentos/gateway/middleware.py"
      - "tests/functional/test_webui_browser*.py"
      - ".github/workflows/webui-browser-smoke.yml"
      - "pyproject.toml"
      - "uv.lock"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  webui-browser-smoke:
    name: Real browser Web UI smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AGENTOS_WEBUI_BROWSER_E2E: "1"
      AGENTOS_WEBUI_BROWSER_CHAT_E2E: "1"
      AGENTOS_TURN_CALL_LOG: "0"
      TMPDIR: /tmp

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure runtime directories
        shell: bash
        run: printf 'AGENTOS_LOG_DIR=%s/agentos-logs\n' "$RUNNER_TEMP" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync --extra dev --frozen

      - name: Build and verify packaged Control UI
        run: python scripts/build_control_ui.py build

      - name: Install Playwright browser
        run: npm --prefix frontend exec -- playwright install chromium

      - name: Run credential-free React browser smoke
        run: |
          uv run pytest \
            tests/functional/test_webui_browser_e2e.py \
            tests/functional/test_webui_browser_chat_e2e.py \
            -q -s
