name: Web UI Browser Smoke

"on":
  workflow_dispatch:

permissions:
  contents: read

jobs:
  webui-browser-smoke:
    name: Real browser Web UI smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AGENTOS_WEBUI_BROWSER_E2E: "1"
      AGENTOS_TURN_CALL_LOG: "0"
      TMPDIR: /tmp

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure runtime directories
        shell: bash
        run: printf 'AGENTOS_LOG_DIR=%s/agentos-logs\n' "$RUNNER_TEMP" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync --extra dev --frozen

      - name: Install Playwright browser
        run: npx --yes playwright install chromium

      - name: Run Web UI browser smoke
        run: uv run pytest tests/functional/test_webui_browser_e2e.py -q -s
