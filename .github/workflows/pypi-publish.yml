name: Publish to PyPI

# Publishes the use-agent-os distribution to PyPI via Trusted Publishing (OIDC).
# One-time setup on pypi.org before the first run: add a (pending) trusted
# publisher for project "use-agent-os" pointing at this repository, workflow file
# "pypi-publish.yml", and environment "pypi".

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: pypi-publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Hydrate LFS embedding and router model assets
        run: |
          git lfs pull --include="src/agentos/memory/models/**"
          git lfs pull --include="src/agentos/agentos_router/models/**"

      - name: Verify LFS assets are hydrated
        run: |
          python3 - <<'PY'
          from pathlib import Path

          roots = [
              Path("src/agentos/memory/models"),
              Path("src/agentos/agentos_router/models"),
          ]
          for root in roots:
              for path in root.rglob("*"):
                  if not path.is_file():
                      continue
                  prefix = path.read_bytes()[:64]
                  assert not prefix.startswith(b"version https://git-lfs.github.com/spec/v1"), (
                      f"LFS pointer not hydrated: {path}"
                  )

          # The legacy v4_phase3 model bundle must NOT ship anymore — it was
          # removed to slim the wheel (~52MB). Same guard as the wheelhouse
          # release, so both publish paths fail loudly if it leaks back.
          legacy = Path("src/agentos/agentos_router/models/v4.2_phase3_inference")
          assert not legacy.exists(), (
              "legacy v4_phase3 bundle leaked back into the tree"
          )

          # Pilot router MiniLM INT8 export (T1). Lives under the
          # memory/models LFS root checked above; listed explicitly so a
          # non-hydrated LFS checkout can't silently ship a pointer file.
          minilm = Path("src/agentos/memory/models/embeddings/all-MiniLM-L6-v2-int8")
          for name in (
              "config.json",
              "model.onnx",
              "special_tokens_map.json",
              "tokenizer.json",
              "tokenizer_config.json",
              "vocab.txt",
          ):
              assert (minilm / name).is_file(), f"missing MiniLM asset: {name}"

          # Pilot production bundle (strategy="pilot-v1", the default). A
          # missing/non-hydrated model.onnx would silently degrade every turn
          # to pilot_unavailable, so ship it or fail the publish loudly.
          pilot = Path("src/agentos/agentos_router/models/pilot_v1")
          for name in (
              "model.onnx",
              "manifest.json",
          ):
              assert (pilot / name).is_file(), f"missing pilot_v1 asset: {name}"
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Build and verify packaged Control UI
        run: python scripts/build_control_ui.py build

      - name: Build distributions
        run: uv build

      - name: Verify packaged Control UI in distributions
        run: python scripts/build_control_ui.py verify-archive dist/*.whl dist/*.tar.gz

      - name: Check tag matches package version
        run: |
          python3 - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          assert tag == f"v{version}", (
              f"tag {tag!r} does not match pyproject version {version!r}"
          )
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: pypi-dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Trusted Publishing exchanges this OIDC token for a short-lived
      # PyPI upload token — no stored API token or secret is involved.
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: pypi-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Tolerate re-pushed tags: files already on PyPI are skipped
          # instead of failing the whole run.
          skip-existing: true
